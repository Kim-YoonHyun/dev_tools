# [1.0.0] @done_log: 쿠버네티스 크론활용을 위한 신규 파일
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analy-module-cron
spec:
  schedule: "*/5 * * * *" # 실행 주기 설정 (리눅스 crontab 문법과 100% 동일)
  concurrencyPolicy: Forbid  # 핵심 요구사항: "이전 작업이 안 끝났으면 건너뛴다"
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          restartPolicy: OnFailure  # 작업이 끝나면 재시작하지 말고(Never/OnFailure) 종료 상태를 유지할 것
          containers:
          - name: analy-module
            image: bus_rt_monitoring:b3.0.28
            imagePullPolicy: Never # 인터넷 다운로드 시도 방지
            command: ["python", "-m", "scripts.run", "--env", "dev", "--run_mode", "normal", "--name", "analy_module"]
            # 컨테이너 내부에 마운트할 경로 설정
            volumeMounts:
            - name: ipconfig-vol
              mountPath: /ipconfig_cryp.ini
              subPath: ipconfig_cryp.ini # 폴더가 아닌 파일 자체를 마운트할 때 필요
              readOnly: true
            - name: cryptogram-vol
              mountPath: /cryptogram
              readOnly: true
            - name: localtime-vol
              mountPath: /etc/localtime
              readOnly: true
            - name: timezone-vol
              mountPath: /etc/timezone
              readOnly: true
          # 실제 호스트(서버)의 파일 경로 정의 (volumes 역할)
          volumes:
          - name: ipconfig-vol
            configMap: # hostPath 대신 configMap 사용
              name: ipconfig-cmap
          - name: cryptogram-vol
            hostPath:
              path: /home/gj_anly/cryptogram
          - name: localtime-vol
            hostPath:
              path: /etc/localtime
          - name: timezone-vol
            hostPath:
              path: /etc/timezone

---
# 2. data-module 배포 정의
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-module
  template:
    metadata:
      labels:
        app: data-module
    spec:
      hostNetwork: true
      containers:
      - name: data-module
        image: bus_rt_monitoring:b3.0.28
        imagePullPolicy: Never
        command: ["python", "-m", "data_module.run"]
        volumeMounts:
        - name: ipconfig-vol
          mountPath: /ipconfig_cryp.ini
          readOnly: true
        - name: cryptogram-vol
          mountPath: /cryptogram
          readOnly: true
        - name: localtime-vol
          mountPath: /etc/localtime
          readOnly: true
        - name: timezone-vol
          mountPath: /etc/timezone
          readOnly: true
      volumes:
      - name: ipconfig-vol
        hostPath:
          path: /home/gj_anly/ipconfig_cryp.ini
      - name: cryptogram-vol
        hostPath:
          path: /home/gj_anly/cryptogram
      - name: localtime-vol
        hostPath:
          path: /etc/localtime
      - name: timezone-vol
        hostPath:
          path: /etc/timezone

---
# 3. route-module 배포 정의 (공통 볼륨/네트워크 설정 없음)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: route-module
  template:
    metadata:
      labels:
        app: route-module
    spec:
      # route-module은 원본에서 host 설정이나 볼륨이 없으므로 생략
      containers:
      - name: route-module
        image: bus_rt_monitoring:b3.0.28
        imagePullPolicy: Never
        command: ["python", "-m", "route_module.run"]