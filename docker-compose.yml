# [1.0.0] @done_log: 도커 컴포트 적용
version: '3.8'

# 공용설정(mode, 호스트 경로 마운트 등)
x-common-config: &common-config
  network_mode: "host"
  # "호스트의경로:image내부경로:모드" 형태로 설정
  # ro : read-only, 아무것도 지정하지 않으면 rw (read/write) 가 기본설정됨
  volumes:
    - /home/gj_anly/ipconfig_cryp.ini:/ipconfig_cryp.ini:ro
    - /home/gj_anly/cryptogram:/cryptogram:ro
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro

services:
  # compose 실행시 서비스 이름
  analy-module:  
  # 공통 설정 불러오기
    <<: *common-config  
    # 실행할 이미지 이름
    image: test:dev
    # 이미지 내 소스코드 실행 명령어
    command: [
      "python", "-m", "scripts.run", 
      "--name", "analy_module", 
      "--env", "dev", 
      "--run_mode", "normal", 
      "--role", "producer",
      # "--role", "consumer",
      "--local"
      ]

  data-module:
    <<: *common-config
    image: bus_rt_monitoring:b3.0.27
    command: ["python", "-m", "data_module.run"]

  route-module:
    image: bus_rt_monitoring:b3.0.27
    command: ["python", "-m", "route_module.run"]