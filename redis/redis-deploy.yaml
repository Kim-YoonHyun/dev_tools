# 1. Redis 컨테이너 띄우기 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: Never  # (중요) 인터넷에서 찾지 말고 방금 로드한 tar 이미지 사용!
        ports:
        - containerPort: 6379

---
# 2. Redis 전용 내부 네트워크 주소 만들기 (Service)
apiVersion: v1
kind: Service
metadata:
  name: redis-svc  # 파이썬 코드에서는 이 이름을 IP 대신 사용합니다!
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379